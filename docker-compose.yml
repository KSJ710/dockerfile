version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: node.dockerfile
    image: select_web
    container_name: select_web
    ports:
      - "3001:3001"
    networks:
      app_net:
        ipv4_address: 192.168.1.2
    volumes:
      - ../app:/home/select_web/app
    tty: true
  db:
    image: postgres:14.0-alpine3.14
    container_name: postgres_select_web
    environment:
      POSTGRES_USER: select_web
      POSTGRES_DB: select_web
      POSTGRES_PASSWORD: select_web710
      PGDATE: /var/lib/postgresql/data
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=ja_JP.UTF-8"
      TZ: Asia/Tokyo
    command: postgres -c tcp_keepalives_idle=30 -c tcp_keepalives_interval=10 -c
      tcp_keepalives_count=2
    ports:
      - "5001:5001"
    networks:
      app_net:
        ipv4_address: 192.168.1.3
    volumes:
      - posgre_data:/var/lib/postgresql/data

networks:
  app_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.168.1.0/24

volumes:
  posgre_data: null
