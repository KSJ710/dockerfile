version: "3.9"

services:
  web:
    build:
      context: .
    container_name: my_web_sample
    environment:
      EMAIL_SERVER_PASSWORD: ""
      EMAIL_SERVER_HOST: smtp
      EMAIL_SERVER_PORT: 1025
      EMAIL_FROM=no-reply@test.comWORD: my_web_sample
    ports:
      - "3000:3000"
    networks:
      app_net:
        ipv4_address: 192.23.11.3
    volumes:
      - ../app:/home/my_web_sample/app
    tty: true
  smtp:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      app_net:
        ipv4_address: 192.23.11.2

networks:
  app_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 192.23.11.1/24
